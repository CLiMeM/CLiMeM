<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Workshop Program</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
</head>
<body data-page="workshop-program">
  <header class="site-header">
    <div class="container">
      <div id="site-header-inner"></div>
    </div>
  </header>
  <nav class="site-nav" aria-label="Main">
    <div class="container">
      <button id="nav-toggle" class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav-inner">
        <span></span><span></span><span></span>
      </button>
      <div id="site-nav-inner"></div>
    </div>
  </nav>

  <main id="main-content">
    <div class="container">
      <h1 class="page-title" id="program-heading"></h1>
      <p class="page-lead" id="program-intro">Program details will be announced soon.</p>
      <h2 class="section-title" id="invited-speakers-title">Invited Speakers</h2>
      <ul class="invited-speakers-list" id="invited-speakers-list"></ul>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div id="site-footer-inner"></div>
    </div>
  </footer>

  <script src="data/workshop.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function () {
      if (typeof window.workshop === 'undefined') return;
      var w = window.workshop;
      document.title = (w.workshopName || '') + ' ' + (w.year || '') + ' — Workshop Program';
      var heading = document.getElementById('program-heading'); if (heading) heading.textContent = 'Workshop Program';
      var intro = document.getElementById('program-intro'); if (intro) intro.textContent = w.programIntro || 'Program details will be announced soon.';
      var speakersTitle = document.getElementById('invited-speakers-title'); if (speakersTitle) speakersTitle.textContent = 'Invited Speakers';
      var speakerList = document.getElementById('invited-speakers-list');
      var speakers = w.invitedSpeakers || [];
      if (speakerList && speakers.length) {
        speakerList.innerHTML = speakers.map(function (s) {
          var photoHtml = s.photo ? '<div class="invited-speaker-photo"><img src="images/' + s.photo + '" alt="' + (s.name || 'Invited speaker') + '" onerror="this.style.display=\'none\'"></div>' : '';
          var titleHtml = s.title ? '<div class="invited-speaker-title">' + s.title + '</div>' : '';
          var affHtml = s.affiliation ? '<div class="invited-speaker-affiliation">' + s.affiliation + '</div>' : '';
          var bioHtml = s.bio ? '<p class="invited-speaker-bio">' + s.bio + '</p>' : '';
          return '<li class="invited-speaker-card">' + photoHtml + '<div class="invited-speaker-body"><h2 class="invited-speaker-name">' + (s.name || '') + '</h2>' + titleHtml + affHtml + bioHtml + '</div></li>';
        }).join('');
      }
    })();
  </script>
</body>
</html>
