<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Call for Papers</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
</head>
<body data-page="call-for-paper">
  <header class="site-header">
    <div class="container">
      <div id="site-header-inner"></div>
    </div>
  </header>
  <nav class="site-nav" aria-label="Main">
    <div class="container">
      <button id="nav-toggle" class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav-inner">
        <span></span><span></span><span></span>
      </button>
      <div id="site-nav-inner"></div>
    </div>
  </nav>

  <main id="main-content">
    <div class="container">
      <h1 class="page-title" id="cfp-title"></h1>
      <div id="cfp-intro"></div>
      <p class="cfp-topics-lead" id="cfp-topics-lead"></p>
      <div id="cfp-topic-groups"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div id="site-footer-inner"></div>
    </div>
  </footer>

  <script src="data/workshop.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function () {
      if (typeof window.workshop === 'undefined') return;
      var w = window.workshop;
      var cfp = w.callForPapers || {};
      document.title = (w.workshopName || '') + ' ' + (w.year || '') + ' — ' + (cfp.title || 'Call for Papers');
      var titleEl = document.getElementById('cfp-title');
      if (titleEl) titleEl.textContent = cfp.title || 'Call for Papers';
      var introEl = document.getElementById('cfp-intro');
      if (introEl && cfp.intro && cfp.intro.length) {
        introEl.innerHTML = cfp.intro.map(function (p) { return '<p class="page-lead">' + p + '</p>'; }).join('');
      }
      var leadEl = document.getElementById('cfp-topics-lead');
      if (leadEl) leadEl.textContent = cfp.topicsLead || 'Topics include, but are not limited to:';
      var groupsEl = document.getElementById('cfp-topic-groups');
      if (groupsEl && cfp.topicGroups && cfp.topicGroups.length) {
        groupsEl.innerHTML = cfp.topicGroups.map(function (g) {
          var items = (g.items || []).map(function (i) { return '<li>' + i + '</li>'; }).join('');
          return '<section class="section"><h2 class="section-title">' + (g.title || '') + '</h2><ul class="cfp-topic-list">' + items + '</ul></section>';
        }).join('');
      }
    })();
  </script>
</body>
</html>
