<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">CLiMeM 2026</title>
  <meta name="description" id="meta-description" content="">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
</head>
<body data-page="index">
  <header class="site-header">
    <div class="container">
      <div id="site-header-inner"></div>
    </div>
  </header>
  <nav class="site-nav" aria-label="Main">
    <div class="container">
      <button id="nav-toggle" class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav-inner">
        <span></span><span></span><span></span>
      </button>
      <div id="site-nav-inner"></div>
    </div>
  </nav>

  <main id="main-content">
    <section class="hero">
      <div class="container">
        <h1 class="hero-title" id="hero-title"></h1>
        <p class="hero-subtitle" id="hero-subtitle"></p>
        <p class="hero-desc" id="hero-desc"></p>
        <div class="hero-cta" id="hero-cta"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div id="site-footer-inner"></div>
    </div>
  </footer>

  <script src="data/workshop.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function () {
      if (typeof window.workshop === 'undefined') return;
      var w = window.workshop;
      document.title = (w.workshopName || '') + ' ' + (w.year || '') + ' — ' + (w.subtitle || '');
      var meta = document.getElementById('meta-description'); if (meta) meta.setAttribute('content', w.description && w.description.short ? w.description.short : '');
      var hero = w.hero;
      if (hero) {
        var t = document.getElementById('hero-title'); if (t) t.textContent = hero.title;
        var s = document.getElementById('hero-subtitle'); if (s) s.textContent = hero.subtitle;
        var d = document.getElementById('hero-desc'); if (d) d.textContent = hero.description;
        var cta = document.getElementById('hero-cta');
        if (cta && hero.ctaPrimary && hero.ctaSecondary) {
          cta.innerHTML = '<a href="' + (hero.ctaPrimary.href || '') + '" class="btn btn-primary">' + (hero.ctaPrimary.label || '') + '</a><a href="' + (hero.ctaSecondary.href || '') + '" class="btn btn-secondary">' + (hero.ctaSecondary.label || '') + '</a>';
        }
      }
    })();
  </script>
</body>
</html>
