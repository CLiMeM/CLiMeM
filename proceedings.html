<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Proceedings</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
</head>
<body data-page="proceedings">
  <header class="site-header">
    <div class="container">
      <div id="site-header-inner"></div>
    </div>
  </header>
  <nav class="site-nav" aria-label="Main">
    <div class="container">
      <button id="nav-toggle" class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav-inner">
        <span></span><span></span><span></span>
      </button>
      <div id="site-nav-inner"></div>
    </div>
  </nav>

  <main id="main-content">
    <div class="container">
      <h1 class="page-title" id="proceedings-heading">Proceedings</h1>
      <p class="page-lead" id="proceedings-intro"></p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div id="site-footer-inner"></div>
    </div>
  </footer>

  <script src="data/workshop.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function () {
      if (typeof window.workshop === 'undefined') return;
      var w = window.workshop;
      document.title = (w.workshopName || '') + ' ' + (w.year || '') + ' — Proceedings';
      var heading = document.getElementById('proceedings-heading'); if (heading) heading.textContent = 'Proceedings';
      var intro = document.getElementById('proceedings-intro');
      if (intro) intro.textContent = w.proceedingsPageIntro || 'All proceedings will be listed below.';
    })();
  </script>
</body>
</html>
