<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Program</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
</head>
<body data-page="program">
  <header class="site-header">
    <div class="container">
      <div id="site-header-inner"></div>
    </div>
  </header>
  <nav class="site-nav" aria-label="Main">
    <div class="container">
      <button id="nav-toggle" class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav-inner">
        <span></span><span></span><span></span>
      </button>
      <div id="site-nav-inner"></div>
    </div>
  </nav>

  <main id="main-content">
    <div class="container">
      <h1 class="page-title" id="program-heading"></h1>
      <p class="page-lead" id="program-intro"></p>
      <p class="page-lead" style="margin-bottom: 1.5rem;" id="program-tz"></p>

      <section class="section" aria-labelledby="schedule-title">
        <h2 id="schedule-title">Tentative schedule (half-day)</h2>
        <ul class="schedule-list" id="schedule-list"></ul>
      </section>

      <section class="section" aria-labelledby="speakers-title">
        <h2 id="speakers-title">Invited speakers</h2>
        <ul class="organizers-list" id="invited-speakers"></ul>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div id="site-footer-inner"></div>
    </div>
  </footer>

  <script src="data/workshop.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function () {
      if (typeof window.workshop === 'undefined') return;
      var w = window.workshop;
      document.title = (w.workshopName || '') + ' ' + (w.year || '') + ' — Program';
      var heading = document.getElementById('program-heading'); if (heading) heading.textContent = 'Program';
      var intro = document.getElementById('program-intro'); if (intro) intro.textContent = w.programIntro || '';
      var tz = document.getElementById('program-tz'); if (tz) tz.textContent = w.programTimezone || '';
      var list = document.getElementById('schedule-list');
      if (list && w.tentativeSchedule && w.tentativeSchedule.length) {
        list.innerHTML = w.tentativeSchedule.map(function (s) {
          var cls = s.type === 'break' ? ' type-break' : '';
          var speaker = s.speaker ? ' — ' + s.speaker : '';
          return '<li><span class="time">' + (s.time || '') + '</span><span class="' + (s.type || '') + cls + '">' + (s.title || '') + speaker + '</span></li>';
        }).join('');
      }
      var speakers = document.getElementById('invited-speakers');
      var inv = w.invitedSpeakers || [];
      if (speakers && inv.length) {
        speakers.innerHTML = inv.map(function (x) {
          return '<li><span class="name">' + (x.name || '') + '</span><br><span class="affiliation">' + (x.affiliation || '') + '</span></li>';
        }).join('');
      }
    })();
  </script>
</body>
</html>
