<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Awards</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
</head>
<body data-page="awards">
  <header class="site-header">
    <div class="container">
      <div id="site-header-inner"></div>
    </div>
  </header>
  <nav class="site-nav" aria-label="Main">
    <div class="container">
      <button id="nav-toggle" class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav-inner">
        <span></span><span></span><span></span>
      </button>
      <div id="site-nav-inner"></div>
    </div>
  </nav>

  <main id="main-content">
    <div class="container">
      <h1 class="page-title" id="awards-heading"></h1>
      <p class="page-lead" id="awards-lead"></p>
      <ul class="awards-list" id="awards-list"></ul>
      <section class="section sponsor-section" id="sponsor-section" aria-labelledby="sponsor-heading">
        <h2 id="sponsor-heading" class="section-title">Sponsor</h2>
        <p id="sponsor-text" class="sponsor-thanks"></p>
        <div class="sponsor-logo-wrap" id="sponsor-logo-wrap"></div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div id="site-footer-inner"></div>
    </div>
  </footer>

  <script src="data/workshop.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function () {
      if (typeof window.workshop === 'undefined') return;
      var w = window.workshop;
      document.title = (w.workshopName || '') + ' ' + (w.year || '') + ' — Awards';
      var heading = document.getElementById('awards-heading'); if (heading) heading.textContent = 'Awards';
      var lead = document.getElementById('awards-lead'); if (lead) lead.textContent = 'We will recognize outstanding contributions at the workshop.';
      var list = w.awards || [];
      var el = document.getElementById('awards-list');
      if (el && list.length) {
        el.innerHTML = list.map(function (a) {
          return '<li><span class="award-name">' + (a.name || '') + ' (TBA)</span><div class="award-desc">' + (a.description || '') + '</div></li>';
        }).join('');
      }
      var sponsor = w.sponsor;
      var sponsorText = document.getElementById('sponsor-text');
      var sponsorWrap = document.getElementById('sponsor-logo-wrap');
      if (sponsor) {
        if (sponsorText) {
          var msg = sponsor.thankYouText || '';
          if (sponsor.linkHref && msg.indexOf('QURIT Lab') !== -1) {
            msg = msg.replace('QURIT Lab', '<a href="' + sponsor.linkHref + '" target="_blank" rel="noopener">QURIT Lab</a>');
          }
          sponsorText.innerHTML = msg;
        }
        if (sponsorWrap && sponsor.image) {
          var imgHtml = '<img src="images/' + sponsor.image + '" alt="QURIT Lab" class="sponsor-logo">';
          if (sponsor.linkHref) {
            imgHtml = '<a href="' + sponsor.linkHref + '" target="_blank" rel="noopener" class="sponsor-logo-link">' + imgHtml + '</a>';
          }
          sponsorWrap.innerHTML = imgHtml;
        }
      } else {
        var sec = document.getElementById('sponsor-section');
        if (sec) sec.style.display = 'none';
      }
    })();
  </script>
</body>
</html>
